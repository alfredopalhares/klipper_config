# Ender 5 BigTreeTech E3D v2.0 Mini Configuration

# Klipper docs/Bootloaders.md file for more information.

# See docs/Config_Reference.md for a description of parameters.

## Imports
# Configuration
[include fluidd.cfg]                    # Fluid
[include configs/printer_mcu_host.cfg]  # Raspberry MCU Specify Configs
[include configs/save_variables.cfg]    # Save Variables

# Macros
[include macros/support.cfg]            # Support Macros
[include macros/general.cfg]            # Printer
[include macros/filament.cfg]           # Filament Control
[include macros/marlin_compability.cfg] # Marlin Compability
[include macros/klipper.cfg]            # Klipper Specifiic Macros
[include macros/debug.cfg]              # Debug



### Motion

[stepper_x]
step_pin: PB13
dir_pin: !PB12
enable_pin: !PB14
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC0
position_endstop: 235
position_max: 235
homing_speed: 30

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 0.580
stealthchop_threshold: 999999

[stepper_y]
step_pin: PB10
dir_pin: !PB2
enable_pin: !PB11
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC1
position_endstop: 235
position_max: 235
homing_speed: 30

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
run_current: 0.580
stealthchop_threshold: 999999

[stepper_z]
step_pin: PB0
dir_pin: !PC5
enable_pin: !PB1
microsteps: 16
rotation_distance: 8
endstop_pin: ^PC2
position_endstop: 0
position_max: 300
position_min: -10
homing_speed: 30

[tmc2209 stepper_z]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
run_current: 0.580
stealthchop_threshold: 999999

## Hotennd

[extruder]
max_extrude_only_distance: 300
step_pin: PB3
dir_pin: !PB4
enable_pin: !PD2
microsteps: 16
min_temp: 0
max_temp: 300
rotation_distance: 24.615384615384617
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC8
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA0
#control: pid
# tuned for stock hardware with 200 degree Celsius target
#pid_Kp: 21.527
#pid_Ki: 1.063
#pid_Kd: 108.982
# min_temp: 0
# max_temp: 250

[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
run_current: 0.650
stealthchop_threshold: 999999


## Heated Bed
[heater_bed]
heater_pin: PC9
sensor_type: ATC Semitec 104GT-2 
sensor_pin: PC3
#control: pid
# tuned for stock hardware with 50 degree Celsius target
#pid_Kp: 54.027
#pid_Ki: 0.770
#pid_Kd: 948.182
min_temp: 0
max_temp: 130

## General Board % Printer Configuration
# Part Cooling Fan
[fan]
pin: PC7

[heater_fan hotend_cooling_fan]
pin: PC6

[mcu]
serial: /dev/serial0
baud: 250000
restart_method: command

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PB5,     EXP1_3=PA9,   EXP1_5=PA10, EXP1_7=PB8,  EXP1_9=<GND>,
    EXP1_2=PA15,    EXP1_4=<RST>, EXP1_6=PB9,  EXP1_8=PB15, EXP1_10=<5V>,
    BLTOUCH_IN=PC14, BLTOUCH_OUT=PA1


[printer]
kinematics: cartesian
max_velocity: 150
max_accel: 500
max_z_velocity: 5
max_z_accel: 100

### Display

[display]
lcd_type: st7920
cs_pin: EXP1_7
sclk_pin: EXP1_6
sid_pin: EXP1_8
encoder_pins: ^EXP1_5, ^EXP1_3
click_pin: ^!EXP1_2

[output_pin beeper]
pin: EXP1_1

## BLTouch

[bltouch]
sensor_pin: ^BLTOUCH_IN  # Pull-up (^ symbol) needed in open drain mode
control_pin: BLTOUCH_OUT
x_offset: -48
y_offset: -8
z_offset: 2.10 # Offset is positive in Kippler
speed: 20
samples: 2

[safe_z_home]
home_xy_position: 115,115
#   A X,Y coordinate (e.g. 100,100) where the Z homing should be
#   performed. This parameter must be provided.
speed: 200
z_hop: 10.0
z_hop_speed: 20
move_to_previous: False


## Bed Leveling

[bed_mesh]
speed: 50 # Must be slow, otherwise the bltouch does not measure correctly
horizontal_move_z: 7.5
mesh_min: 10,10
mesh_max: 165,180 # Do not forget the Offset of the BLTouc
probe_count: 4,4
algorithm: lagrange

